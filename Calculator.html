<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            column-gap: 10px;
            row-gap: 10px;
        }
        .calculator {
            width: 270px;
            display: inline-block;
            background-color: black;
            padding: 20px;
            border-radius: 20px;
            position: relative;
        }
        .calculation {
            text-align: right;
            color: white;
            font-size: 50px;
            margin: 8px 5px; 
        }
        .btn-1, .btn-2, .btn-3 {
            border: none;
            height: 60px;
            border-radius: 35px;
            font-size: 26px;
            color: white;
        }
        .btn-1 {
            background-color: rgb(118, 117, 117);
        }
        .btn-2 {
            background-color: rgb(186, 134, 13);
        }
        .btn-3 {
            background-color: rgb(63, 63, 63);
        }
        .calc {
            font-size: 24px;
            margin-right: 7px;
            margin-bottom: -8px;
            margin-top: 25px;
            text-align: right;
        }
        .prev-calc {
            color: rgb(148, 148, 148);
        }
        .cover {
            position: absolute;
            background-color: rgb(0, 0, 0);
            right: 0;
            top: 70px;
            height: 65px;
            width: 22px;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="cover"></div>
        <p class="calc">0</p>
        <p class="calculation">0</p>
        <div class="buttons">
            <button class="btn-1" onclick="calculation = ''; allClear();">AC</button>
            <button class="btn-1" onclick="calculation = -calculation; display();">+/-</button>
            <button class="btn-1" onclick="calculation += ' % '; display();">%</button>
            <button class="btn-2" onclick="calculation += ' / '; display();">/</button>
            <button class="btn-3" onclick="calculation += '7'; display();">7</button>
            <button class="btn-3" onclick="calculation += '8'; display();">8</button>
            <button class="btn-3" onclick="calculation += '9'; display();">9</button>
            <button class="btn-2" onclick="calculation += ' * '; display();">x</button>
            <button class="btn-3" onclick="calculation += '4'; display();">4</button>
            <button class="btn-3" onclick="calculation += '5'; display();">5</button>
            <button class="btn-3" onclick="calculation += '6'; display();">6</button>
            <button class="btn-2" onclick="calculation += ' - '; display();">-</button>
            <button class="btn-3" onclick="calculation += '1'; display();">1</button>
            <button class="btn-3" onclick="calculation += '2'; display();">2</button>
            <button class="btn-3" onclick="calculation += '3'; display();">3</button>
            <button class="btn-2" onclick="calculation += ' + '; display();">+</button>
            <button class="btn-3" onclick="calculation += ' ** '; display();">^</button>
            <button class="btn-3" onclick="calculation += '0'; display();">0</button>
            <button class="btn-3" onclick="calculation += '.'; display();">.</button>
            <button class="btn-2" onclick="prevCalc(); evaluate();">=</button>
        </div>
    </div>
    
    <script>
        let calculation = '';
        function display() {
            document.querySelector('.calculation').innerHTML = calculation;
            document.querySelector('.calc').classList.remove('prev-calc');
        };
        function allClear() {
            document.querySelector('.calculation').innerHTML = '0';
            document.querySelector('.calc').classList.remove('prev-calc');
        };
        function prevCalc() {
            document.querySelector('.calc').innerHTML = calculation;
            document.querySelector('.calc').classList.add('prev-calc');
        }
        function evaluate() {
            calculation = eval(calculation);
            document.querySelector('.calculation').innerHTML = calculation;
        }
    </script>
</body>
</html>
